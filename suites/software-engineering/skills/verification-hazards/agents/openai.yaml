interface:
  display_name: "Verification Hazards"
  short_description: "Proof-challenge lens for green/red runs, staging, partial rollouts, approval gates, and agent reports"
  default_prompt: "Use $verification-hazards when a result or report is being treated as proof, especially approve/ship/merge/accept/close/go-no-go/production-run questions based on tests, staging, partial rollout, dashboards, or agent reports. Start with Claim Under Test, scan bypassed-layer green, subset green, wrong-theory green, wrong-tree green, and not-your-red, then return confirmed or still a lead with the next gate."
